<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data Penduduk - Cloud App</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <h2 class="mb-4 text-center text-primary">Aplikasi Manajemen Data Penduduk</h2>

        <!-- Form Tambah Data -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Tambah Data Penduduk</h5>
            </div>
            <div class="card-body">
                <form id="formTambah">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">NIK</label>
                            <input type="text" id="nik" class="form-control" placeholder="Masukkan NIK" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">Nama Lengkap</label>
                            <input type="text" id="nama" class="form-control" placeholder="Masukkan Nama" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Jenis Kelamin</label>
                            <select id="jenisKelamin" class="form-select" required>
                                <option value="true">Laki-Laki</option>
                                <option value="false">Perempuan</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success mt-3">Simpan Data</button>
                </form>
            </div>
        </div>

        <!-- Tabel Data Penduduk -->
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Daftar Penduduk</h5>
                <button class="btn btn-sm btn-light" onclick="loadData()">Refresh Data</button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>NIK</th>
                                <th>Nama</th>
                                <th>Jenis Kelamin</th>
                                <th class="text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelPenduduk">
                            <tr>
                                <td colspan="5" class="text-center">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Edit Data -->
    <div class="modal fade" id="modalEdit" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title">Edit Data Penduduk</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="form-label">NIK</label>
                        <input type="text" id="editNik" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" id="editNama" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Jenis Kelamin</label>
                        <select id="editJenisKelamin" class="form-select" required>
                            <option value="true">Laki-Laki</option>
                            <option value="false">Perempuan</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-warning" onclick="simpanEdit()">Update Data</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.bundle.min.js"></script>

    <script>
        // ==============================================================
        // GANTI URL INI SESUAI ENDPOINT AZURE FUNCTION KAMU
        // (Bisa localhost saat tes lokal atau URL Azure Function saat publik)
        // ==============================================================
        const API_URL = "http://localhost:7071/api/penduduk"; 
        // Contoh URL Cloud: "https://func-penduduk-12345.azurewebsites.net/api/penduduk"

        let modalEditInstance;

        document.addEventListener("DOMContentLoaded", () => {
            modalEditInstance = new bootstrap.Modal(document.getElementById('modalEdit'));
            loadData();
        });

        // 1. GET ALL DATA
        async function loadData() {
            const tbody = document.getElementById("tabelPenduduk");
            tbody.innerHTML = `<tr><td colspan="5" class="text-center">Memuat data...</td></tr>`;

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                tbody.innerHTML = "";
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center">Belum ada data penduduk.</td></tr>`;
                    return;
                }

                // Tampilkan maksimal 100 data pertama di tabel agar browser tidak berat
                data.slice(0, 100).forEach(p => {
                    const id = p.idPenduduk || p.IdPenduduk;
                    const nik = p.nik || p.Nik;
                    const nama = p.nama || p.Nama;
                    const jkBool = p.jenisKelamin !== undefined ? p.jenisKelamin : p.JenisKelamin;
                    const jkText = jkBool ? "Laki-Laki" : "Perempuan";

                    tbody.innerHTML += `
                        <tr>
                            <td>${id}</td>
                            <td>${nik}</td>
                            <td>${nama}</td>
                            <td><span class="badge ${jkBool ? 'bg-info' : 'bg-danger'}">${jkText}</span></td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-warning me-1" onclick="bukaModalEdit(${id}, '${nik}', '${nama}', ${jkBool})">Edit</button>
                                <button class="btn btn-sm btn-danger" onclick="hapusData(${id})">Hapus</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Gagal mengambil data dari API! Pastikan CORS aktif.</td></tr>`;
            }
        }

        // 2. CREATE (POST) DATA
        document.getElementById("formTambah").addEventListener("submit", async (e) => {
            e.preventDefault();
            const payload = {
                nik: document.getElementById("nik").value,
                nama: document.getElementById("nama").value,
                jenisKelamin: document.getElementById("jenisKelamin").value === "true"
            };

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert("Data penduduk berhasil ditambahkan!");
                    document.getElementById("formTambah").reset();
                    loadData();
                } else {
                    alert("Gagal menambahkan data.");
                }
            } catch (err) {
                alert("Terjadi kesalahan sistem.");
            }
        });

        // 3. BUKA MODAL EDIT
        function bukaModalEdit(id, nik, nama, jk) {
            document.getElementById("editId").value = id;
            document.getElementById("editNik").value = nik;
            document.getElementById("editNama").value = nama;
            document.getElementById("editJenisKelamin").value = jk.toString();
            modalEditInstance.show();
        }

        // 4. UPDATE (PUT) DATA
        async function simpanEdit() {
            const id = document.getElementById("editId").value;
            const payload = {
                nik: document.getElementById("editNik").value,
                nama: document.getElementById("editNama").value,
                jenisKelamin: document.getElementById("editJenisKelamin").value === "true"
            };

            try {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert("Data penduduk berhasil diperbarui!");
                    modalEditInstance.hide();
                    loadData();
                } else {
                    alert("Gagal memperbarui data.");
                }
            } catch (err) {
                alert("Terjadi kesalahan sistem.");
            }
        }

        // 5. DELETE DATA
        async function hapusData(id) {
            if (!confirm(`Apakah Anda yakin ingin menghapus data dengan ID ${id}?`)) return;

            try {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: "DELETE"
                });

                if (res.ok) {
                    alert("Data berhasil dihapus!");
                    loadData();
                } else {
                    alert("Gagal menghapus data.");
                }
            } catch (err) {
                alert("Terjadi kesalahan sistem.");
            }
        }
    </script>
</body>
</html>
